name: Trendyol Scraper - Günlük 3 Tarama

on:
  schedule:
    - cron: '0 6 * * *'   # Sabah 09:00 (UTC+3)
    - cron: '0 10 * * *'  # Öğle 13:00
    - cron: '0 16 * * *'  # Akşam 19:00
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 260 ürün × ~8s + buffer = ~45dk scraping
    # Karşılaştırma + mail ~5dk
    # Toplam güvenli sınır: 120 dakika
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Repository'yi klonla
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright tarayıcılarını kur
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Scraper'ı çalıştır
        env:
          CI: 'true'
          TRENDYOL_STORE_URL: ${{ secrets.TRENDYOL_STORE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SCAN_TIMEOUT: ${{ secrets.SCAN_TIMEOUT }}
          MAX_RETRIES: ${{ secrets.MAX_RETRIES }}
          MY_MERCHANT_NAME: ${{ secrets.MY_MERCHANT_NAME }}
          ENABLE_PRICE_ALERTS: ${{ secrets.ENABLE_PRICE_ALERTS }}
          PRICE_ALERT_THRESHOLD: ${{ secrets.PRICE_ALERT_THRESHOLD }}
          # Batch ayarları — Actions'da memory patlamasını önler
          SCRAPER_BATCH_SIZE: '5'
          SCRAPER_MAX_WORKERS: '3'
          OUTPUT_FOLDER: reports
          DEBUG_MODE: 'False'
        run: python controller/main_controller.py

      - name: Dosyaları listele
        if: always()
        run: |
          echo "=== reports/ ==="
          ls -lah reports/ || echo "reports/ bulunamadı"
          echo "=== xlsx dosyaları ==="
          find . -name "*.xlsx" -type f 2>/dev/null || echo "Yok"

      - name: Raporları GitHub Releases'a yükle
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: reports/trendyol_rapor.xlsx
          tag_name: report-${{ github.run_number }}
          body: "Trendyol fiyat raporu — Tarama #${{ github.run_number }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Karşılaştırma ve Bildirim
        if: success()
        env:
          TRENDYOL_STORE_URL: ${{ secrets.TRENDYOL_STORE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          MY_MERCHANT_NAME: ${{ secrets.MY_MERCHANT_NAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python -c "
          from services.telegram_service import TelegramService
          from services.notification_service import NotificationService
          from config.config import Config
          import logging
          logging.basicConfig(level=logging.INFO)
          telegram = TelegramService(Config.TELEGRAM_BOT_TOKEN, Config.TELEGRAM_CHAT_ID)
          notification = NotificationService(telegram, Config.MY_MERCHANT_NAME)
          notification.compare_and_notify()
          "

      - name: Raporları Artifacts'a yükle (Yedek)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trendyol-rapor-${{ github.run_number }}
          path: reports/*.xlsx
          retention-days: 30

      - name: Hata durumunda Telegram bildirimi
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=❌ Trendyol scraper hatası! Run #${{ github.run_number }} başarısız.%0A🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"