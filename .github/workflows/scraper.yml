name: Trendyol Scraper - Saatlik Çalıştırma

on:
  schedule:
    # Her saat başında çalıştır (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:  # Manuel tetikleme için

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Repository'yi klonla
      uses: actions/checkout@v3
    
    - name: Python 3.11'i yükle
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Bağımlılıkları yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
    
    - name: Scraper'ı çalıştır
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: python controller/main_controller.py
    
    - name: Raporu GitHub'a commit et
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add reports/ || true
        git commit -m "📊 Saatlik Trendyol raporu - $(date +'%Y-%m-%d %H:%M:%S')" || true
        git push
      continue-on-error: true
    
    - name: Hata durumunda bildirim gönder
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "
        import requests
        import os
        from datetime import datetime
        
        token = os.getenv('TELEGRAM_BOT_TOKEN')
        chat_id = os.getenv('TELEGRAM_CHAT_ID')
        
        message = f'❌ Trendyol Scraper Hatası\n\nZaman: {datetime.now().strftime(\"%Y-%m-%d %H:%M:%S\")}\n\nLütfen GitHub Actions loglarını kontrol et.'
        
        requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            json={'chat_id': chat_id, 'text': message}
        )
        "
      continue-on-error: true
